{{ template "header.html" . }}

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  .dex-login-container {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: row;
    font-family: sans-serif;
    overflow: hidden;
    justify-content: center;
    align-items: center;
  }

  /* Blurred background */
  .bg-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('{{ url .ReqPath "/theme/bg-logs.png" }}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: blur(4px) brightness(0.5);
    transform: scale(1.1);
    z-index: 1;
  }

  /* Form section - centered */
  .login-form-section {
    flex: none;
    width: auto;
    max-width: 550px;
    height: auto;
    margin: 0 auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    overflow: visible;
    align-items: center;
    justify-content: center;
  }

  .login-content-container {
    width: 100%;
    max-width: 400px;
    margin-top: 0;
  }

  .theme-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 500px;
  }

  /* Form header */
  .form-header {
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    z-index: 1;
  }

  .form-title {
    font-size: 2rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 0.5rem;
  }

  .form-subtitle {
    color: #475569;
    font-size: 1rem;
    margin: 0;
  }

  /* Light blue bordered panel */
  .modern-bordered-panel {
    position: relative;
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    background: rgba(219, 234, 254, 0.95);
    backdrop-filter: blur(20px);
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.3), 0 0 1px rgba(59, 130, 246, 0.4);
    width: 100%;
    box-sizing: border-box;
  }

  .modern-bordered-panel::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.6), transparent);
  }

  /* Email note */
  .official-email-note {
    background: rgba(37, 99, 235, 0.12);
    color: #1e40af;
    padding: 0.75rem;
    border: 1px solid rgba(59, 130, 246, 0.35);
    border-radius: 6px;
    margin-bottom: 1rem;
    margin-top: 0.5rem;
    text-align: center;
    font-size: clamp(12px, 2.5vw, 14px);
  }

  #login-buttons {
    text-align: -webkit-center;
  }

  .dex-btn-text {
    color: #334155;
  }

  /* Dark icons for email and github */
  .dex-btn-icon--local,
  .dex-btn-icon--github {
    filter: brightness(0) saturate(100%) invert(20%) sepia(10%) saturate(500%) hue-rotate(180deg);
  }

  /* Login buttons */
  .modern-btn {
    width: 325px;
    border: 1px solid rgba(59, 130, 246, 0.25);
    background: rgba(239, 246, 255, 0.6);
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    padding: 2px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
  }

  .modern-btn:hover {
    border-color: rgba(59, 130, 246, 0.5);
    background: rgba(191, 219, 254, 0.8);
    box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.4), 0 0 20px rgba(59, 130, 246, 0.3);
  }

  /* Footer */
  .page-footer {
    text-align: center;
    padding: 1rem;
    margin-top: 2rem;
    flex-shrink: 0;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    z-index: 10;
  }

  .page-footer > div {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .modern-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    color: #ffffff;
    transition: all 0.3s ease;
  }

  .modern-link:hover {
    color: #cbd5e1;
  }

  .modern-link img {
    filter: brightness(0) invert(1);
  }

  .copyright-text {
    color: #ffffff;
    font-size: 14px;
    font-weight: 500;
  }

  @media (max-width: 768px) {
    .dex-login-container {
      flex-direction: column;
      min-height: 100vh;
    }

    .login-form-section {
      flex: none;
      min-height: 60vh;
      padding: 1rem;
    }

    .login-content-container {
      max-width: 100%;
    }

    .modern-bordered-panel {
      padding: 1.5rem 1rem;
      border-radius: 12px;
    }

    .form-title {
      font-size: 1.5rem;
    }

    .modern-btn {
      width: 100% !important;
      max-width: 300px;
    }

    .page-footer {
      padding: 0.75rem;
      position: relative;
    }

    .page-footer div[style*="display: flex"] {
      flex-direction: column;
      gap: 8px !important;
    }
  }
</style>

<div class="dex-login-container">
  <div class="bg-container"></div>

  <!-- Centered form -->
  <div class="login-form-section">
    <div class="login-content-container">
      <div class="theme-panel modern-bordered-panel">
        <div class="form-header">
          <h2 class="form-title">Welcome Back</h2>
          <p class="form-subtitle">Sign in to your OpenObserve account</p>
        </div>
        <div id="login-buttons">
          <div class="official-email-note">
            Only <strong>work emails</strong> are supported.
          </div>
          {{ range $c := .Connectors }}
            <div class="theme-form-row">
              <a class="theme-btn-provider-link modern-btn" href="{{ $c.URL }}" target="_self">
                <button class="dex-btn theme-btn-provider login-btn" style="background: none; border: none; display: flex; align-items: center; gap: 20px; width: 100%; text-align: left; padding: 0;">
                  <span class="dex-btn-icon dex-btn-icon--{{ $c.Type }}" style="width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 16px;"></span>
                  {{- if eq $c.ID "casdoor" }}
                  <span class="dex-btn-text" style="flex: 1;">Sign In / Sign Up with Email</span>
                  {{- else }}
                  <span class="dex-btn-text" style="flex: 1;">Continue with {{ $c.Name }}</span>
                  {{- end }}
                </button>
              </a>
            </div>
          {{ end }}
        </div>
      </div>

      <!-- Footer -->
      <div class="page-footer">
        <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 12px;">
          <a class="dex-link modern-link" href="{{ "terms_of_use" | extra }}" target="_blank">Terms of Use
            <img src="{{ url .ReqPath "/theme/arrow_right.svg" }}" alt="right arrow" />
          </a>
          <a class="dex-link modern-link" href="{{ "privacy_policy" | extra }}" target="_blank">Privacy Policy
            <img src="{{ url .ReqPath "/theme/arrow_right.svg" }}" alt="right arrow" />
          </a>
        </div>
        <div class="copyright-text">
          &copy; OpenObserve <span id="year"></span>
        </div>
      </div>
    </div>
  </div>
</div>

{{ template "footer.html" . }}

<script>
  document.getElementById('year').innerHTML = new Date().getFullYear();
</script>
